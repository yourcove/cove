name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/Cove.slnx

      - name: Build
        run: dotnet build src/Cove.slnx -c Release --no-restore

      - name: Test
        run: dotnet test src/Cove.Tests/Cove.Tests.csproj -c Release --no-build --verbosity normal

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install
        working-directory: ui
        run: npm ci

      - name: Type check & build
        working-directory: ui
        run: npm run build

      - name: Test
        working-directory: ui
        run: npx vitest run --passWithNoTests
